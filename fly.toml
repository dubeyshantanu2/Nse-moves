# fly.toml app configuration file for nse-moves
# Background worker bot - no HTTP service required

app = 'nse-moves'
primary_region = 'bom'

[env]
  # No PORT needed for background bot, but keeping it won't hurt
  UPDATE_INTERVAL_SECONDS = '300'

[processes]
  app = 'python bot.py'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
