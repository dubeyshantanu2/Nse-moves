# fly.toml app configuration file for nse-moves

app = 'nse-moves'
primary_region = 'bom'

[env]
  UPDATE_INTERVAL_SECONDS = '300'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[processes]
  app = 'python bot.py'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
